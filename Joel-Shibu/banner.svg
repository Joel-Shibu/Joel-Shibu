<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 200" preserveAspectRatio="xMidYMid meet">
  <defs>
    <!-- Glow filters -->
    <filter id="glow-green" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow-blue" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Gradient -->
    <linearGradient id="cyber-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0f0f1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a0a0a;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="scanline" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00ff8800;stop-opacity:0" />
      <stop offset="50%" style="stop-color:#00ff8830;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00ff8800;stop-opacity:0" />
    </linearGradient>
    
    <!-- Clip path for scan effect -->
    <clipPath id="scan-clip">
      <rect x="0" y="0" width="900" height="200" />
    </clipPath>
  </defs>
  
  <!-- Background -->
  <rect width="900" height="200" fill="url(#cyber-gradient)" />
  
  <!-- Grid lines -->
  <g stroke="#00ff8815" stroke-width="0.5" fill="none">
    <line x1="0" y1="40" x2="900" y2="40" />
    <line x1="0" y1="80" x2="900" y2="80" />
    <line x1="0" y1="120" x2="900" y2="120" />
    <line x1="0" y1="160" x2="900" y2="160" />
    <line x1="150" y1="0" x2="150" y2="200" />
    <line x1="300" y1="0" x2="300" y2="200" />
    <line x1="450" y1="0" x2="450" y2="200" />
    <line x1="600" y1="0" x2="600" y2="200" />
    <line x1="750" y1="0" x2="750" y2="200" />
  </g>
  
  <!-- Animated scan line -->
  <rect x="0" y="0" width="900" height="200" fill="url(#scanline)" clip-path="url(#scan-clip)">
    <animate attributeName="y" values="-200;400" dur="3s" repeatCount="indefinite" />
  </rect>
  
  <!-- JOEL text with glitch effect -->
  <g filter="url(#glow-green)">
    <text x="100" y="120" font-family="monospace" font-size="72" font-weight="900" fill="#00ff88" opacity="0.9">JOEL</text>
    <!-- Glitch layers -->
    <text x="100" y="120" font-family="monospace" font-size="72" font-weight="900" fill="#ff0000" opacity="0.5">
      <animate attributeName="x" values="100;102;100;98;100" dur="0.1s" repeatCount="indefinite" />
      JOEL
    </text>
    <text x="100" y="120" font-family="monospace" font-size="72" font-weight="900" fill="#00ffff" opacity="0.3">
      <animate attributeName="x" values="100;99;100;101;100" dur="0.15s" repeatCount="indefinite" />
      JOEL
    </text>
  </g>
  
  <!-- SHIBU text -->
  <g filter="url(#glow-green)">
    <text x="320" y="120" font-family="monospace" font-size="72" font-weight="900" fill="#00ff88" opacity="0.9">SHIBU</text>
    <text x="320" y="120" font-family="monospace" font-size="72" font-weight="900" fill="#ff0000" opacity="0.3">
      <animate attributeName="x" values="320;321;319;322;320" dur="0.12s" repeatCount="indefinite" />
      SHIBU
    </text>
  </g>
  
  <!-- Status indicator -->
  <circle cx="780" cy="60" r="8" fill="#00ff88">
    <animate attributeName="opacity" values="1;0.3;1" dur="1.5s" repeatCount="indefinite" />
  </circle>
  <text x="800" y="65" font-family="monospace" font-size="12" fill="#00ff88">ONLINE</text>
  
  <!-- Decorative brackets -->
  <text x="60" y="50" font-family="monospace" font-size="24" fill="#00d4ff">[</text>
  <text x="60" y="170" font-family="monospace" font-size="24" fill="#00d4ff">[</text>
  <text x="820" y="50" font-family="monospace" font-size="24" fill="#00d4ff">]</text>
  <text x="820" y="170" font-family="monospace" font-size="24" fill="#00d4ff">]</text>
  
  <!-- Animated particles -->
  <g fill="#00ff88" opacity="0.6">
    <circle cx="50" cy="30" r="2">
      <animate attributeName="cy" values="30;170;30" dur="4s" repeatCount="indefinite" />
    </circle>
    <circle cx="200" cy="170" r="1.5">
      <animate attributeName="cy" values="170;30;170" dur="3.5s" repeatCount="indefinite" />
    </circle>
    <circle cx="450" cy="50" r="2">
      <animate attributeName="cy" values="50;150;50" dur="5s" repeatCount="indefinite" />
    </circle>
    <circle cx="650" cy="160" r="1.5">
      <animate attributeName="cy" values="160;40;160" dur="4.5s" repeatCount="indefinite" />
    </circle>
    <circle cx="850" cy="80" r="2">
      <animate attributeName="cy" values="80;180;80" dur="3s" repeatCount="indefinite" />
    </circle>
  </g>
  
  <!-- Bottom bar -->
  <rect x="0" y="190" width="900" height="10" fill="#00ff8830" />
  <rect x="0" y="190" width="700" height="10" fill="#00ff88">
    <animate attributeName="width" values="100;800;100" dur="2s" repeatCount="indefinite" />
  </rect>
</svg>